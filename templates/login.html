<!DOCTYPE html>
<html>
<head>
    <title>FocusFlow Pro - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; transition: background 0.3s ease; }

        .login-panel { width: 100%; max-width: 420px; background: rgba(255,255,255,.95); border-radius: 14px; box-shadow: 0 0 30px rgba(0,0,0,.25); padding: 28px; }
        .login-title { font-weight: 700; margin-bottom: 20px; }

        body.default { background-image: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%); color:#111827; }
        body.dark { background-image: linear-gradient(135deg, #0f172a 0%, #020617 100%); color:#f8fafc; }
        body.blue { background-image: linear-gradient(135deg, #dbeafe 0%, #93c5fd 100%); }
        body.green { background-image: linear-gradient(135deg, #dcfce7 0%, #86efac 100%); }
        body.purple { background-image: linear-gradient(135deg, #ede9fe 0%, #c4b5fd 100%); }
        body.orange { background-image: linear-gradient(135deg, #ffedd5 0%, #fb923c 100%); }

        .login-panel .btn-primary { background-color: #0d6efd; border-color: #0d6efd; }
    </style>
</head>
<body class="default">

<div class="login-panel">
    <h2 class="login-title text-center">Welcome Back</h2>
    <p class="text-muted text-center mb-4">Sign in to manage your tasks like a pro.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
</div>

<script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        document.body.className = savedTheme;
    }
</script>

</body>
</html>
